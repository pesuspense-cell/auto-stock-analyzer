# ════════════════════════════════════════════════════════════════════════════
#  Render Blueprint — ASA 백엔드 (FastAPI web + jobs 워커)
#
#  한 청사진에서 2개 서비스를 띄운다. 둘 다 web/backend 코드이지만, 레포 루트의
#  src/* 와 live_screener.py 를 sys.path(app/bootstrap.py)로 재사용하므로 전체 레포가
#  체크아웃돼 있어야 한다(rootDir 는 실행 위치일 뿐, 루트 파일은 ../../ 로 접근 가능).
#
#  배포:
#    1) Render 대시보드 → New → Blueprint → 이 레포 연결 → render.yaml 자동 감지
#    2) 두 서비스(asa-api, asa-worker)에 SUPABASE_DB_URL 등 환경변수 입력(아래 sync:false)
#    3) Vercel 의 BACKEND_URL 을 asa-api 의 https URL 로 지정 → next.config.mjs 폴백 동작
#
#  ⚠️ 워커(type: worker)는 Render 유료 플랜이 필요(상시 프로세스). web(free)은 15분
#     무요청 시 슬립 → 첫 요청 콜드스타트. 운영 트래픽이 생기면 web 도 유료 권장.
# ════════════════════════════════════════════════════════════════════════════
services:
  # ── FastAPI: analysis · news · fundamental (경로 A 폴백 대상) ────────────────
  - type: web
    name: asa-api
    runtime: python
    plan: free                      # 운영 시 starter 이상 권장(콜드스타트 제거)
    rootDir: web/backend
    buildCommand: pip install -r requirements.txt -r ../../requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # healthCheckPath 의도적으로 미설정: 무료 0.1 CPU 에서 무거운 분석이 이벤트 루프를
    # 점유하면 HTTP 헬스체크(5s)가 타임아웃 → Render 가 바쁜 인스턴스를 죽여 분석이 502 로
    # 끊긴다. 헬스체크를 끄면 포트만 확인 → 분석이 느려도 완료된다(Starter 면 다시 켜도 됨).
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SUPABASE_DB_URL        # 풀러 URL (aws-1-ap-northeast-1.pooler...)
        sync: false
      - key: CORS_ORIGINS           # 예: https://<your-app>.vercel.app
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: KRX_ID
        sync: false
      - key: KRX_PW
        sync: false

  # ── 통합 워커: jobs(ASA·백테스트) + 시그널 봇(1:N) + 텔레그램 연동 ───────────
  #   worker_launcher.py 가 worker.jobs_worker + signal_bot.py + telegram_link_bot.py 를
  #   자식 프로세스로 띄우고 죽으면 자동 재시작. 별도 워커 분리 없이 한 인스턴스로 통합(비용 절감).
  #   ⚠️ 텔레그램 폴러는 1개만 — 이 워커 가동 시 로컬 bot.py(start_all.bat)는 끄세요.
  - type: worker
    name: asa-worker
    runtime: python
    plan: starter                   # worker 는 free 불가 — 상시 실행 유료 플랜
    rootDir: web/backend
    buildCommand: pip install -r requirements.txt -r ../../requirements.txt
    startCommand: python worker_launcher.py
    # ⚠️ 워커는 수동 배포 — autoDeploy 를 끄는 이유: 재배포는 SIGTERM 으로 워커를 내리는데,
    #    그 순간 진행 중이던 무거운 작업(분석·백테스트, 80~140s)이 끊겨 'processing' 고아가 됐다.
    #    push 마다 재배포되면 작업 중 사망이 잦아진다. 코드 변경 후 작업이 한산할 때 대시보드에서
    #    Manual Deploy 로 올린다. (종료 시 _requeue_inflight 가 미완료분을 pending 으로 되돌리고,
    #    리퍼가 10분 안전망으로 회수하지만, 끊김 자체를 줄이려 수동 배포로 둔다.)
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SUPABASE_DB_URL        # (jobs) asa-api 와 동일 풀러 URL
        sync: false
      - key: JOBS_POLL_INTERVAL
        value: "3"
      # ── 시그널 봇/연동봇용 (REST: RLS 우회 읽기/쓰기) ──────────────────────────
      - key: TELEGRAM_BOT_TOKEN     # BotFather 토큰
        sync: false
      - key: SUPABASE_URL           # 예: https://<ref>.supabase.co
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY   # secret 키(sb_secret_...)
        sync: false
      - key: SIGNAL_POLL_MIN        # 감시 주기(분)
        value: "5"
      - key: SIGNAL_UNIVERSE_N      # 매수 스크리닝 유니버스 상위 N
        value: "100"
      # (선택) 운영 알림용 관리자 chat — 봇 가동/장시작·마감 안내 수신
      # - key: TELEGRAM_CHAT_ID
      #   sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: KRX_ID
        sync: false
      - key: KRX_PW
        sync: false
